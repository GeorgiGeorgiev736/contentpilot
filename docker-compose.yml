services:

  postgres:
    image: postgres:16-alpine
    container_name: autopilot_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       autopilot
      POSTGRES_USER:     autopilot
      POSTGRES_PASSWORD: autopilot123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autopilot"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: autopilot_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: