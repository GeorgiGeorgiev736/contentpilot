<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="500" height="500" rx="110" fill="#7C5CFC"/>

  <!-- Rocket body + nose (one solid white shape) -->
  <!-- Bullet-shaped body: rounded top tapering to a point, straight sides, flat base -->
  <path d="
    M250 70
    C250 70 200 140 200 255
    L300 255
    C300 140 250 70 250 70
    Z
  " fill="white"/>

  <!-- Left fin -->
  <path d="M200 240 L158 300 L200 285 Z" fill="white"/>

  <!-- Right fin -->
  <path d="M300 240 L342 300 L300 285 Z" fill="white"/>

  <!-- Nozzle -->
  <rect x="220" y="255" width="60" height="20" rx="8" fill="white"/>

  <!-- Porthole ring (purple cutout so the white shows as a ring) -->
  <circle cx="250" cy="195" r="26" fill="#7C5CFC"/>
  <circle cx="250" cy="195" r="18" fill="#7C5CFC"/>

  <!-- Porthole white ring -->
  <circle cx="250" cy="195" r="26" fill="none" stroke="white" stroke-width="9"/>

  <!-- Flame: outer glow -->
  <ellipse cx="250" cy="305" rx="28" ry="42" fill="white" opacity="0.45"/>

  <!-- Flame: inner bright -->
  <ellipse cx="250" cy="300" rx="16" ry="30" fill="white" opacity="0.85"/>
</svg>
